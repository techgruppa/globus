<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Fontenehus Globus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #040d21;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #globeViz {
            width: 100vw;
            height: 100vh;
        }

        /* Hexagon marker — hollow with border */
        .hex-outer {
            width: 14px;
            height: 14px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .hex-outer:hover {
            transform: scale(1.4);
        }

        .hex-outer.norway {
            background: #ff4455;
            filter: drop-shadow(0 0 4px rgba(255, 68, 85, 0.6));
        }

        .hex-outer.intl {
            background: #ffaa22;
            filter: drop-shadow(0 0 4px rgba(255, 170, 34, 0.6));
        }

        /* Inner cutout to make it hollow */
        .hex-inner {
            width: 8px;
            height: 8px;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            background: #040d21;
        }

        /* Hex marker label — hidden by default, shown on click */
        .hex-label {
            position: absolute;
            top: 18px;
            left: 50%;
            transform: translateX(-50%);
            white-space: nowrap;
            font-size: 9px;
            color: #fff;
            text-shadow: 0 0 4px rgba(0, 0, 0, 0.9), 0 0 8px rgba(0, 0, 0, 0.5);
            pointer-events: none;
            font-weight: 600;
            opacity: 0;
            transition: opacity 0.25s;
        }

        .hex-label.visible {
            opacity: 1;
        }

        /* Click popup with website link */
        #marker-popup {
            position: fixed;
            padding: 12px 18px;
            background: rgba(10, 20, 40, 0.96);
            border: 1px solid rgba(100, 200, 255, 0.4);
            border-radius: 10px;
            color: #d0eaff;
            font-size: 13px;
            pointer-events: auto;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 200;
            backdrop-filter: blur(10px);
            max-width: 280px;
            display: none;
        }

        #marker-popup.visible {
            opacity: 1;
            display: block;
        }

        #marker-popup .popup-name {
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            margin-bottom: 2px;
        }

        #marker-popup .popup-country {
            opacity: 0.7;
            font-size: 12px;
            margin-bottom: 8px;
        }

        #marker-popup .popup-link {
            display: inline-block;
            color: #4fc3f7;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 10px;
            border: 1px solid rgba(79, 195, 247, 0.4);
            border-radius: 6px;
            transition: background 0.2s, color 0.2s;
        }

        #marker-popup .popup-link:hover {
            background: rgba(79, 195, 247, 0.2);
            color: #fff;
        }

        /* Country label styling (rendered by globe.gl label layer) */
        .country-label {
            color: rgba(160, 200, 240, 0.5);
            font-size: 11px;
            font-family: 'Segoe UI', sans-serif;
            pointer-events: none;
            text-shadow: 0 0 3px rgba(0, 0, 0, 0.8);
        }

        /* Tooltip on hover */
        #tooltip {
            position: fixed;
            padding: 10px 16px;
            background: rgba(10, 20, 40, 0.94);
            border: 1px solid rgba(100, 200, 255, 0.35);
            border-radius: 8px;
            color: #d0eaff;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 100;
            backdrop-filter: blur(8px);
        }

        #tooltip.visible {
            opacity: 1;
        }

        #tooltip .tt-name {
            font-weight: 700;
            font-size: 14px;
            color: #fff;
        }

        #tooltip .tt-country {
            opacity: 0.7;
            font-size: 12px;
            margin-top: 3px;
        }
    </style>
</head>

            locations.forEach(function (loc) {
                if (urlMap[loc.name]) {
                    loc.url = urlMap[loc.name];
                }
            });

            // ============================================================
            //  COUNTRY LABELS (hardcoded centroids so they always show)
            // ============================================================

                { name: 'Spania', lat: 40.0, lng: -3.5 },

                { name: 'Mexico', lat: 23.5, lng: -102.0 },
                { name: 'Brasil', lat: -10.0, lng: -52.0 },
                { name: 'Argentina', lat: -35.0, lng: -65.0 },
                { name: 'Kina', lat: 35.0, lng: 103.0 },
                { name: 'India', lat: 22.0, lng: 79.0 },

                { name: 'Iran', lat: 32.5, lng: 53.5 },
                { name: 'Indonesia', lat: -2.0, lng: 118.0 },
                { name: 'Sør-Korea', lat: 36.0, lng: 128.0 },
            ];

            // Combine data for HTML layer
            var htmlData = [
                ...locations.map(d => ({ ...d, isMarker: true })),
                ...countryLabels.map(d => ({ ...d, isLabel: true }))
            ];

            // Randomize ripple properties for each location
            locations.forEach(function (loc) {
                loc.rippleSpeed = 1 + Math.random() * 2; // Speed between 1 and 3
                loc.ripplePeriod = 1000 + Math.random() * 2500; // Period between 1s and 3.5s
            });

            // ============================================================
            //  GLOBE
            // ============================================================
            var container = document.getElementById('globeViz');
            var tooltipEl = document.getElementById('tooltip');

            if (typeof Globe === 'undefined') {
                document.body.innerHTML = '<div style="color:#f55;padding:40px;font-size:18px;">Feil: globe.gl lastet ikke. Sjekk at globe.gl.min.js finnes i mappen.</div>';
                return;
            }

            // Create element for markers or labels
            function createHtmlEl(d) {
                if (d.isLabel) {
                    var el = document.createElement('div');
                    el.className = 'country-label';
                    el.textContent = d.name;
                    return el;
                }

                // Marker logic
                var wrapper = document.createElement('div');
                wrapper.style.position = 'relative';
                wrapper.style.display = 'flex';
                wrapper.style.flexDirection = 'column';
                wrapper.style.alignItems = 'center';
                wrapper.style.pointerEvents = 'auto';
                wrapper.style.cursor = 'pointer';

                var hexOuter = document.createElement('div');
                hexOuter.className = 'hex-outer ' + d.type;

                var hexInner = document.createElement('div');
                hexInner.className = 'hex-inner';
                hexOuter.appendChild(hexInner);
                wrapper.appendChild(hexOuter);

                var label = document.createElement('div');
                label.className = 'hex-label';
                label.textContent = d.name;
                wrapper.appendChild(label);

                var startX = 0, startY = 0;
                wrapper.addEventListener('mousedown', function (e) {
                    startX = e.clientX;
                    startY = e.clientY;
                });
                wrapper.addEventListener('mouseup', function (e) {
                    var dx = e.clientX - startX;
                    var dy = e.clientY - startY;
                    if (Math.abs(dx) < 5 && Math.abs(dy) < 5) {
                        label.classList.toggle('visible');
                        var popup = document.getElementById('marker-popup');
                        if (d.url) {
                            popup.querySelector('.popup-name').textContent = d.name;
                            popup.querySelector('.popup-country').textContent = d.country || '';
                            popup.querySelector('.popup-link').href = d.url;
                            popup.querySelector('.popup-link').style.display = 'inline-block';
                        } else {
                            popup.querySelector('.popup-name').textContent = d.name;
                            popup.querySelector('.popup-country').textContent = d.country || '';
                            popup.querySelector('.popup-link').style.display = 'none';
                        }
                        popup.style.left = e.clientX + 15 + 'px';
                        popup.style.top = e.clientY - 10 + 'px';
                        var pw = 280, ph = 100;
                        if (e.clientX + 15 + pw > window.innerWidth) popup.style.left = (e.clientX - pw - 10) + 'px';
                        if (e.clientY - 10 + ph > window.innerHeight) popup.style.top = (e.clientY - ph) + 'px';
                        popup.classList.add('visible');
                    }
                });

                wrapper.addEventListener('mouseenter', function () {
                    tooltipEl.querySelector('.tt-name').textContent = d.name;
                    tooltipEl.querySelector('.tt-country').textContent = d.country || '';
                    tooltipEl.classList.add('visible');
                });
                wrapper.addEventListener('mouseleave', function () {
                    tooltipEl.classList.remove('visible');
                });

                return wrapper;
            }

            var world = Globe()(container)
                .width(window.innerWidth)
                .height(window.innerHeight)
                .backgroundColor('#040d21')

                // Globe surface
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')

                // Atmosphere
                .showAtmosphere(true)
                .atmosphereColor('#4db8ff')
                .atmosphereAltitude(0.2)

                // Hex polygons for land
                .hexPolygonResolution(3)
                .hexPolygonMargin(0.35)
                .hexPolygonColor(function () { return 'rgba(0, 220, 130, 0.2)'; })
                .hexPolygonLabel(function (d) {
                    var name = d.properties ? (d.properties.ADMIN || d.properties.NAME || '') : '';
                    return '<div style="background:rgba(10,20,40,0.92);color:#d0eaff;padding:6px 12px;border-radius:6px;font-size:13px;border:1px solid rgba(100,200,255,0.3);">' + name + '</div>';
                })

                // Country border outlines (orange)
                .polygonCapColor(function () { return 'rgba(0, 0, 0, 0)'; })
                .polygonSideColor(function () { return 'rgba(255, 165, 0, 0.9)'; })
                .polygonStrokeColor(function () { return 'rgba(255, 165, 0, 1)'; })
                .polygonAltitude(0.02)

                // Markers and Country Labels via HTML elements (Unicode safe!)
                .htmlElementsData(htmlData)
                .htmlLat('lat')
                .htmlLng('lng')
                .htmlAltitude(0.01)
                .htmlElement(createHtmlEl)

                // Animated rings
                .ringsData(locations)
                .ringLat('lat')
                .ringLng('lng')
                .ringMaxRadius(4)
                .ringPropagationSpeed(function (d) { return d.rippleSpeed || 2; })
                .ringRepeatPeriod(function (d) { return d.ripplePeriod || 2000; })
                .ringColor(function () {
                    return function (t) { return 'rgba(255, 80, 80, ' + (1 - t) + ')'; };
                });

            // Auto-rotate
            var controls = world.controls();
            controls.autoRotate = false;
            controls.autoRotateSpeed = 0.5;
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Start centered on Norway
            world.pointOfView({ lat: 62, lng: 10, altitude: 2.2 }, 1500);

            // Mouse tracking for tooltip
            container.addEventListener('mousemove', function (e) {
                tooltipEl.style.left = (e.clientX + 16) + 'px';
                tooltipEl.style.top = (e.clientY + 16) + 'px';
            });

            // Dismiss popup when clicking outside
            container.addEventListener('click', function (e) {
                var popup = document.getElementById('marker-popup');
                if (!e.target.closest('#marker-popup') && !e.target.closest('.hex-outer')) {
                    popup.classList.remove('visible');
                }
            });

            // Load hex polygons + country borders
            fetch('https://raw.githubusercontent.com/vasturiano/three-globe/master/example/datasets/ne_110m_admin_0_countries.geojson')
                .then(function (r) { return r.json(); })
                .then(function (countries) {
                    world.hexPolygonsData(countries.features);
                    world.polygonsData(countries.features);
                })
                .catch(function (err) {
                    console.warn('Hex land data did not load:', err);
                });

            // Responsive
            window.addEventListener('resize', function () {
                world.width(window.innerWidth);
                world.height(window.innerHeight);
            });

            console.log('Globe initialized with ' + locations.length + ' locations');
        })();
    </script>
